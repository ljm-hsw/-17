[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
test_framework = unity
build_flags = -D CORE_DEBUG_LEVEL=0

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = +<event_id.cpp> -<main.cpp>
