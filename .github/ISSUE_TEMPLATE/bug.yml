name: Bug
description: 报告可复现的问题
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      placeholder: "1. 打开…\n2. 点击…\n3. 观察…"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望与实际结果
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: 受影响端或接口
      placeholder: "backend / admin-web / miniprogram / firmware"
    validations:
      required: true
  - type: input
    id: owner
    attributes:
      label: 建议负责人
