<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <dir>/System/Library/Fonts</dir>
  <dir>/System/Library/Fonts/Supplemental</dir>
  <dir>/Library/Fonts</dir>
  <cachedir>/private/tmp/codex-fontconfig-cache</cachedir>
  <alias>
    <family>SimSun</family>
    <prefer><family>Songti SC</family></prefer>
  </alias>
  <alias>
    <family>SimHei</family>
    <prefer><family>Heiti SC</family></prefer>
  </alias>
  <config></config>
</fontconfig>
